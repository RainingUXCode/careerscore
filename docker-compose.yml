services:
  backend:
    build:
      context: ./backend

    env_file:
      - .env

    environment:
      DJANGO_SQLITE_PATH: /data/db.sqlite3
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend

    ports:
      - "8000:8000"

    volumes:
      - backend-data:/data

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/')"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "5173:80"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

volumes:
  backend-data:
